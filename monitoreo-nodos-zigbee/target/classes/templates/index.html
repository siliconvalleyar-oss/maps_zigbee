<!DOCTYPE html>
<html>
<head>
    <title>Monitoreo de Nodos Zigbee en CABA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .contenedor {
            display: flex;
            height: 100vh;
        }

        /* Panel lateral */
        .panel {
            width: 400px;
            background-color: #1e1e2d;
            color: white;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel h2 {
            text-align: center;
            color: #00d4aa;
            border-bottom: 2px solid #00d4aa;
            padding-bottom: 10px;
            font-size: 1.3em;
        }

        /* Tarjeta de cada nodo */
        .tarjeta-nodo {
            background-color: #2a2a3c;
            border-radius: 10px;
            padding: 15px;
            border-left: 5px solid #555;
            transition: all 0.3s;
        }

        .tarjeta-nodo.online {
            border-left-color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.2);
        }

        .tarjeta-nodo.warning {
            border-left-color: #ffd600;
            box-shadow: 0 0 15px rgba(255, 214, 0, 0.2);
        }

        .tarjeta-nodo.offline {
            border-left-color: #ff1744;
            box-shadow: 0 0 15px rgba(255, 23, 68, 0.2);
        }

        .tarjeta-nodo h3 {
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .tarjeta-nodo .dato {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.9em;
            color: #ccc;
        }

        .tarjeta-nodo .dato span:last-child {
            color: white;
            font-weight: bold;
        }

        /* Badge de estado */
        .estado-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .estado-badge.online {
            background-color: #00e676;
            color: #000;
        }

        .estado-badge.warning {
            background-color: #ffd600;
            color: #000;
        }

        .estado-badge.offline {
            background-color: #ff1744;
            color: #fff;
        }

        /* Botones de cambio de estado */
        .botones-estado {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }

        .btn-estado {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75em;
            text-transform: uppercase;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-estado:hover {
            transform: scale(1.05);
        }

        .btn-estado:active {
            transform: scale(0.95);
        }

        .btn-online {
            background-color: #00e676;
            color: #000;
        }

        .btn-online:hover {
            background-color: #00c853;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .btn-warning {
            background-color: #ffd600;
            color: #000;
        }

        .btn-warning:hover {
            background-color: #ffc400;
            box-shadow: 0 0 10px rgba(255, 214, 0, 0.5);
        }

        .btn-offline {
            background-color: #ff1744;
            color: #fff;
        }

        .btn-offline:hover {
            background-color: #d50000;
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.5);
        }

        /* Botón general */
        .btn-actualizar {
            background-color: #00d4aa;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.3s;
            margin-top: auto;
        }

        .btn-actualizar:hover {
            background-color: #00b894;
        }

        .ultima-actualizacion {
            text-align: center;
            font-size: 0.8em;
            color: #888;
        }

        /* Mapa */
        #map {
            flex: 1;
            height: 100vh;
        }

        /* Responsive: en pantallas chicas, panel abajo */
        @media (max-width: 768px) {
            .contenedor {
                flex-direction: column-reverse;
            }
            .panel {
                width: 100%;
                max-height: 50vh;
            }
            #map {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <!-- Panel lateral con datos y botones -->
        <div class="panel" id="panel-nodos">
            <h2>📡 Nodos de Monitoreo</h2>
            <div id="lista-nodos">
                <p style="text-align: center; color: #888;">Cargando datos...</p>
            </div>
            <button class="btn-actualizar" onclick="cargarDatos()">🔄 Refrescar datos</button>
            <p class="ultima-actualizacion" id="timestamp"></p>
        </div>

        <!-- Mapa -->
        <div id="map"></div>
    </div>

    <script>
        let mapa;
        let marcadores = [];

        function initMap() {
            mapa = new google.maps.Map(document.getElementById('map'), {
                center: { lat: -34.6118, lng: -58.4173 },
                zoom: 13
            });

            cargarDatos();
        }

        function cargarDatos() {
            fetch('/api/nodos')
                .then(response => response.json())
                .then(nodos => {
                    actualizarPanel(nodos);
                    actualizarMarcadores(nodos);
                    document.getElementById('timestamp').textContent = 
                        'Última actualización: ' + new Date().toLocaleTimeString();
                })
                .catch(error => {
                    console.error('Error al obtener nodos:', error);
                    document.getElementById('lista-nodos').innerHTML = 
                        '<p style="text-align: center; color: #ff1744;">Error al cargar datos</p>';
                });
        }

        function cambiarEstado(nodoId, nuevoEstado) {
            fetch(`/api/nodos/${nodoId}/estado`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ estado: nuevoEstado })
            })
            .then(response => response.json())
            .then(nodoActualizado => {
                console.log(`Nodo ${nodoId} cambiado a: ${nodoActualizado.estado}`);
                // Recargar todos los datos para reflejar el cambio
                cargarDatos();
            })
            .catch(error => {
                console.error('Error al cambiar estado:', error);
                alert('Error al cambiar el estado del nodo');
            });
        }

        function actualizarPanel(nodos) {
            const contenedor = document.getElementById('lista-nodos');
            contenedor.innerHTML = '';

            nodos.forEach(nodo => {
                const tarjeta = document.createElement('div');
                tarjeta.className = `tarjeta-nodo ${nodo.estado}`;

                tarjeta.innerHTML = `
                    <h3>📍 ${nodo.nombre}</h3>
                    <div class="dato">
                        <span>ID:</span>
                        <span>${nodo.id}</span>
                    </div>
                    <div class="dato">
                        <span>Latitud:</span>
                        <span>${nodo.latitud.toFixed(4)}°</span>
                    </div>
                    <div class="dato">
                        <span>Longitud:</span>
                        <span>${nodo.longitud.toFixed(4)}°</span>
                    </div>
                    <div class="dato">
                        <span>Estado actual:</span>
                        <span class="estado-badge ${nodo.estado}">${nodo.estado}</span>
                    </div>
                    <div class="botones-estado">
                        <button class="btn-estado btn-online" onclick="cambiarEstado(${nodo.id}, 'online')">
                            🟢 ONLINE
                        </button>
                        <button class="btn-estado btn-warning" onclick="cambiarEstado(${nodo.id}, 'warning')">
                            🟡 WARNING
                        </button>
                        <button class="btn-estado btn-offline" onclick="cambiarEstado(${nodo.id}, 'offline')">
                            🔴 OFFLINE
                        </button>
                    </div>
                `;

                // Al hacer clic en la tarjeta (no en los botones), centrar el mapa
                tarjeta.addEventListener('click', (e) => {
                    // Evitar que el clic en botones también centre el mapa
                    if (e.target.tagName !== 'BUTTON') {
                        mapa.setCenter({ lat: nodo.latitud, lng: nodo.longitud });
                        mapa.setZoom(16);
                    }
                });

                contenedor.appendChild(tarjeta);
            });
        }

        function actualizarMarcadores(nodos) {
            // Eliminar marcadores anteriores
            marcadores.forEach(m => m.setMap(null));
            marcadores = [];

            nodos.forEach(nodo => {
                let icono;
                switch(nodo.estado) {
                    case 'online':
                        icono = 'http://maps.google.com/mapfiles/ms/icons/green-dot.png';
                        break;
                    case 'warning':
                        icono = 'http://maps.google.com/mapfiles/ms/icons/yellow-dot.png';
                        break;
                    case 'offline':
                        icono = 'http://maps.google.com/mapfiles/ms/icons/red-dot.png';
                        break;
                    default:
                        icono = null;
                }

                const marker = new google.maps.Marker({
                    position: { lat: nodo.latitud, lng: nodo.longitud },
                    map: mapa,
                    title: nodo.nombre,
                    icon: icono
                });

                const infowindow = new google.maps.InfoWindow({
                    content: `
                        <b>${nodo.nombre}</b><br>
                        ID: ${nodo.id}<br>
                        Lat: ${nodo.latitud.toFixed(4)}°<br>
                        Lng: ${nodo.longitud.toFixed(4)}°<br>
                        Estado: ${nodo.estado}
                    `
                });

                marker.addListener('click', () => {
                    infowindow.open(mapa, marker);
                });

                marcadores.push(marker);
            });
        }
    </script>
    <!-- ⚠️ Reemplaza TU_API_KEY con tu clave real -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCGbLfwvbxGV_bWvbtkHQrV8hHM7flIwMo&callback=initMap"></script>
</body>
</html>
